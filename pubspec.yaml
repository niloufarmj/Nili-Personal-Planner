name: personal_planner
description: "A fully local personal life-management app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^15.1.2

  # Database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1

  # Calendar UI
  table_calendar: ^3.2.0

  # RRULE
  rrule: ^0.2.4

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

  # Images
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0

  # Backup / share
  archive: ^4.0.4
  share_plus: ^10.1.4
  file_picker: ^8.1.7

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  uuid: ^4.5.1
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.2
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.4
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.4

flutter:
  uses-material-design: true
